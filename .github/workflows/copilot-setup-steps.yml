name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    strategy:
      fail-fast: false
      matrix:
        config: 
          - { name: Linux,   runner: ubuntu-latest  , ws: 'gtk',   arch: 'x86_64'  }
          - { name: MacOS,   runner: macos-latest   , ws: 'cocoa', arch: 'aarch64' }
          - { name: Windows, runner: windows-latest , ws: 'win32', arch: 'x86_64'  }
    runs-on: ${{ matrix.config.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Set up Maven
        uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0 # v5.1
        with:
          maven-version: '3.9.14'
      - name: Prepare Linux Build
        if: ${{ matrix.config.name == 'Linux' }}
        run: |
          sudo apt-get update -qq 
          sudo apt-get install -qq -y libgtk-3-dev libgtk-4-dev freeglut3-dev webkit2gtk-driver

      - name: Generate Unix build script
        if: ${{ matrix.config.name == 'Linux' || matrix.config.name == 'MacOS' }}
        run: |
          mkdir -p build/${{ matrix.config.ws }} && mkdir -p build/tmp
          
          cat << EOF > build_${{ matrix.config.ws }}.sh
          java -Dws=${{ matrix.config.ws }} -Darch=${{ matrix.config.arch }} bundles/org.eclipse.swt/build-scripts/CollectSources.java -nativeSources 'build/${{ matrix.config.ws }}'
          SWT_JAVA_HOME=${JAVA_HOME} MODEL=${{ matrix.config.arch }} OUTPUT_DIR=build/tmp build.sh install clean
          EOF
          chmod +x build_${{ matrix.config.ws }}.sh
          
          ./build_gtk.sh || ./build_cocoa.sh

      - name: Generate Windows build script
        if: ${{ matrix.config.name == 'Windows' }}
        shell: cmd
        run: |
          mkdir build\${{ matrix.config.ws }}
          mkdir build\tmp
          
          echo ^
          java -Dws=${{ matrix.config.ws }} -Darch=${{ matrix.config.arch }} bundles\org.eclipse.swt\build-scripts\CollectSources.java -nativeSources 'build\${{ matrix.config.ws }}' ^
          
          SWT_JAVA_HOME=${JAVA_HOME} MODEL=${{ matrix.config.arch }} OUTPUT_DIR=build\tmp build.sh install clean ^
          > build_${{ matrix.config.ws }}.bat
          
          cmd /c build_win32.bat
